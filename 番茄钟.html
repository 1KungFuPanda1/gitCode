<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 番茄钟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF0F5;
  --card: #FFFFFF;
  --pink: #FF6B8A;
  --pink-deep: #FF4081;
  --pink-light: #FFB3C6;
  --pink-pale: #FFE0E8;
  --text: #4A3040;
  --text-light: #C0909E;
  --green: #FF8FAB;
  --shadow: 0 8px 32px rgba(255,107,138,0.18);
  --shadow-lg: 0 16px 48px rgba(255,107,138,0.22);
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', 'Quicksand', sans-serif;
  background: linear-gradient(135deg, #FFF0F5 0%, #FFE4EC 30%, #FFDEE9 60%, #FFF5F7 100%);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  user-select: none; overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,150,180,0.2) 0%, transparent 40%),
    radial-gradient(circle at 75% 60%, rgba(255,180,200,0.25) 0%, transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(255,200,210,0.15) 0%, transparent 35%);
}

/* 漂浮装饰 */
.floating-hearts {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
.heart-float {
  position: absolute; opacity: 0.15; font-size: 24px;
  animation: floatUp 8s ease-in infinite;
}
.heart-float:nth-child(1) { left: 10%; bottom: -5%; animation-delay: 0s; font-size: 28px; }
.heart-float:nth-child(2) { left: 25%; bottom: -5%; animation-delay: 2s; font-size: 18px; }
.heart-float:nth-child(3) { left: 45%; bottom: -5%; animation-delay: 4s; font-size: 32px; }
.heart-float:nth-child(4) { left: 65%; bottom: -5%; animation-delay: 1s; font-size: 20px; }
.heart-float:nth-child(5) { left: 80%; bottom: -5%; animation-delay: 5s; font-size: 26px; }
.heart-float:nth-child(6) { left: 90%; bottom: -5%; animation-delay: 3s; font-size: 16px; }
.heart-float:nth-child(7) { left: 5%; bottom: -5%; animation-delay: 6s; font-size: 22px; }

@keyframes floatUp {
  0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
  10% { opacity: 0.15; }
  80% { opacity: 0.1; }
  100% { transform: translateY(-105vh) rotate(45deg) scale(1.2); opacity: 0; }
}

.app {
  position: relative; z-index: 1;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(24px);
  border-radius: 40px; padding: 44px 52px;
  box-shadow: var(--shadow-lg), 0 1px 3px rgba(0,0,0,0.04);
  text-align: center; min-width: 420px;
  border: 2px solid rgba(255,180,200,0.35);
}

/* ── 标题 ── */
.title-area {
  margin-bottom: 24px;
}
.title-area .emoji {
  font-size: 36px; display: block; margin-bottom: 4px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.title-area .label {
  font-family: 'Quicksand', sans-serif; font-size: 18px; font-weight: 700;
  color: var(--pink-deep); letter-spacing: 2px;
}

/* ── 模式切换 ── */
.mode-switch {
  display: flex; background: var(--pink-pale); border-radius: 24px;
  padding: 5px; margin-bottom: 28px; gap: 4px;
}
.mode-btn {
  flex: 1; padding: 10px 18px; border: none; border-radius: 20px;
  cursor: pointer; font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 600;
  background: transparent; color: var(--text-light); transition: all 0.35s;
}
.mode-btn.active {
  background: #fff; color: var(--pink-deep);
  box-shadow: 0 4px 14px rgba(255,107,138,0.2);
}

/* ── 环形计时器 ── */
.ring-container {
  position: relative; width: 270px; height: 270px; margin: 0 auto 28px;
}
.ring-container svg { width: 100%; height: 100%; }
.ring-bg {
  fill: none; stroke: #FFE8EE; stroke-width: 14;
}
.ring-progress {
  fill: none; stroke: var(--pink); stroke-width: 14;
  stroke-linecap: round; transform: rotate(-90deg); transform-origin: center;
  transition: stroke-dashoffset 0.3s ease-out;
  filter: drop-shadow(0 0 8px rgba(255,107,138,0.4));
}
.ring-progress.countup { stroke: #FFB347; filter: drop-shadow(0 0 8px rgba(255,179,71,0.4)); }

/* 内圈装饰点 */
.ring-dot {
  fill: var(--pink-light); opacity: 0.6;
}

.timer-display {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center;
}
.timer-min {
  font-family: 'Quicksand', sans-serif; font-size: 56px; font-weight: 700;
  color: var(--text); letter-spacing: -1px; line-height: 1;
}
.timer-sec {
  font-family: 'Quicksand', sans-serif; font-size: 26px; font-weight: 500;
  color: var(--text-light); margin-top: 2px;
}

/* ── 预设 ── */
.presets {
  display: flex; gap: 10px; justify-content: center; margin-bottom: 26px; flex-wrap: wrap;
}
.preset-btn {
  padding: 10px 20px; border: 2px solid var(--pink-pale); border-radius: 20px;
  cursor: pointer; font-family: 'Quicksand', sans-serif; font-size: 13px; font-weight: 600;
  background: #fff; color: var(--text-light); transition: all 0.3s;
}
.preset-btn:hover { border-color: var(--pink-light); color: var(--pink); transform: translateY(-2px); }
.preset-btn.selected {
  background: var(--pink); border-color: var(--pink); color: #fff;
  box-shadow: 0 4px 16px rgba(255,107,138,0.35);
}

/* ── 控制 ── */
.controls { display: flex; gap: 18px; justify-content: center; align-items: center; margin-bottom: 22px; }
.ctrl-btn {
  width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--pink-pale);
  cursor: pointer; font-size: 16px; transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
  background: #fff; color: var(--text-light);
}
.ctrl-btn:hover { border-color: var(--pink-light); color: var(--pink); transform: scale(1.08); }
.btn-start {
  width: 70px; height: 70px; font-size: 26px;
  background: linear-gradient(135deg, var(--pink), var(--pink-deep)); color: #fff;
  border: none; box-shadow: 0 6px 28px rgba(255,107,138,0.45);
}
.btn-start:hover { transform: scale(1.08); box-shadow: 0 10px 36px rgba(255,107,138,0.55); }
.btn-start.running {
  background: linear-gradient(135deg, #FFB347, #FF8C42);
  box-shadow: 0 6px 28px rgba(255,179,71,0.45);
}

/* ── 状态 ── */
.status-row { margin-bottom: 18px; }
.status {
  font-family: 'Quicksand', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--text-light); letter-spacing: 2px; transition: color 0.5s;
}

/* ── 自定义 ── */
.custom-row {
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.custom-row input {
  width: 50px; padding: 10px 6px; border: 2px solid var(--pink-pale); border-radius: 14px;
  background: #fff; color: var(--text); text-align: center;
  font-family: 'Quicksand', sans-serif; font-size: 15px; font-weight: 600; outline: none;
  transition: border-color 0.3s;
}
.custom-row input:focus { border-color: var(--pink); }
.custom-row .custom-label {
  font-size: 13px; font-weight: 600; color: var(--text-light);
}
.custom-row .custom-apply {
  padding: 10px 20px; border: 2px solid var(--pink-pale); border-radius: 20px;
  cursor: pointer; background: #fff; color: var(--text-light);
  font-family: 'Quicksand', sans-serif; font-size: 13px; font-weight: 600;
  transition: all 0.3s;
}
.custom-row .custom-apply:hover {
  border-color: var(--pink-light); color: var(--pink);
}

/* ── 完成动画 ── */
@keyframes celebrateRing {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(255,107,138,0.4)); }
  50% { filter: drop-shadow(0 0 28px rgba(255,107,138,0.85)); }
}
.ring-complete { animation: celebrateRing 0.8s ease-in-out 5; }
@keyframes pop {
  0% { transform: translate(-50%, -50%) scale(1); }
  40% { transform: translate(-50%, -50%) scale(1.12); }
  70% { transform: translate(-50%, -50%) scale(0.95); }
  100% { transform: translate(-50%, -50%) scale(1); }
}
.timer-pop { animation: pop 0.5s ease-out; }
</style>
</head>
<body>

<!-- 漂浮爱心 -->
<div class="floating-hearts">
  <span class="heart-float">💕</span>
  <span class="heart-float">🌸</span>
  <span class="heart-float">💖</span>
  <span class="heart-float">✨</span>
  <span class="heart-float">💗</span>
  <span class="heart-float">🎀</span>
  <span class="heart-float">💝</span>
</div>

<div class="app">
  <!-- 标题 -->
  <div class="title-area">
    <span class="emoji">🍅</span>
    <span class="label">番茄钟</span>
  </div>

  <!-- 模式切换 -->
  <div class="mode-switch">
    <button class="mode-btn active" data-mode="countdown" onclick="switchMode('countdown')">⏳ 倒计时</button>
    <button class="mode-btn" data-mode="countup" onclick="switchMode('countup')">⏱ 正计时</button>
  </div>

  <!-- 环形计时器 -->
  <div class="ring-container" id="ringContainer">
    <svg viewBox="0 0 270 270">
      <circle class="ring-bg" cx="135" cy="135" r="115"/>
      <circle class="ring-progress" id="ring" cx="135" cy="135" r="115"
              stroke-dasharray="0" stroke-dashoffset="0"/>
      <!-- 装饰点 -->
      <circle class="ring-dot" cx="135" cy="20" r="4"/>
      <circle class="ring-dot" cx="135" cy="250" r="4"/>
      <circle class="ring-dot" cx="20" cy="135" r="4"/>
      <circle class="ring-dot" cx="250" cy="135" r="4"/>
    </svg>
    <div class="timer-display" id="displayWrap">
      <div class="timer-min" id="display">25:00</div>
    </div>
  </div>

  <!-- 预设 -->
  <div class="presets">
    <button class="preset-btn" onclick="setPreset(5)">5 分钟</button>
    <button class="preset-btn selected" onclick="setPreset(25)">25 分钟</button>
    <button class="preset-btn" onclick="setPreset(15)">15 分钟</button>
    <button class="preset-btn" onclick="setPreset(45)">45 分钟</button>
    <button class="preset-btn" onclick="setPreset(60)">60 分钟</button>
  </div>

  <!-- 控制 -->
  <div class="controls">
    <button class="ctrl-btn" onclick="reset()" title="重置">↺</button>
    <button class="ctrl-btn btn-start" id="startBtn" onclick="toggle()">▶</button>
    <button class="ctrl-btn" onclick="skipToEnd()" title="快进">⏭</button>
  </div>

  <div class="status-row">
    <span class="status" id="status">准备专注 ✨</span>
  </div>

  <!-- 自定义 -->
  <div class="custom-row">
    <input type="number" id="customMin" min="1" max="120" value="30">
    <span class="custom-label">分钟</span>
    <button class="custom-apply" onclick="setCustom()">自定义</button>
  </div>
</div>

<script>
const RADIUS = 115;
const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
const ring = document.getElementById('ring');
const displayEl = document.getElementById('display');
const startBtn = document.getElementById('startBtn');
const statusEl = document.getElementById('status');
const ringContainer = document.getElementById('ringContainer');
const displayWrap = document.getElementById('displayWrap');

ring.style.strokeDasharray = CIRCUMFERENCE;
ring.style.strokeDashoffset = 0;

let mode = 'countdown';
let totalSeconds = 25 * 60;
let remainingSeconds = totalSeconds;
let running = false;
let interval = null;

function switchMode(m) {
  if (running) return;
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-mode="${m}"]`).classList.add('active');
  ring.classList.toggle('countup', m === 'countup');
  reset();
}

function setPreset(min) {
  if (running) return;
  totalSeconds = min * 60;
  remainingSeconds = totalSeconds;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');
  updateDisplay(); updateRing();
  statusEl.textContent = '准备专注 ✨';
}

function setCustom() {
  const val = parseInt(document.getElementById('customMin').value);
  if (val < 1 || val > 120 || running) return;
  totalSeconds = val * 60;
  remainingSeconds = totalSeconds;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  updateDisplay(); updateRing();
  statusEl.textContent = '准备专注 ✨';
}

function toggle() { running ? pause() : start(); }

function start() {
  if (running) return;
  if (mode === 'countdown' && remainingSeconds <= 0) {
    remainingSeconds = totalSeconds; updateDisplay(); updateRing();
  }
  running = true;
  startBtn.textContent = '⏸';
  startBtn.classList.add('running');
  statusEl.textContent = mode === 'countdown' ? '💖 专注中...' : '⏱ 计时中...';
  ringContainer.classList.remove('ring-complete');

  interval = setInterval(() => {
    if (mode === 'countdown') {
      remainingSeconds--;
      if (remainingSeconds <= 0) { remainingSeconds = 0; complete(); return; }
    } else {
      remainingSeconds++;
    }
    updateDisplay(); updateRing();
  }, 1000);
}

function pause() {
  running = false; clearInterval(interval);
  startBtn.textContent = '▶';
  startBtn.classList.remove('running');
  statusEl.textContent = '已暂停 🌸';
}

function reset() {
  running = false; clearInterval(interval);
  remainingSeconds = mode === 'countdown' ? totalSeconds : 0;
  startBtn.textContent = '▶';
  startBtn.classList.remove('running');
  updateDisplay(); updateRing();
  statusEl.textContent = '准备专注 ✨';
  ringContainer.classList.remove('ring-complete');
}

function skipToEnd() {
  if (mode !== 'countdown' || !running) return;
  remainingSeconds = 0; updateDisplay(); updateRing();
  complete();
}

function complete() {
  running = false; clearInterval(interval);
  startBtn.textContent = '▶';
  startBtn.classList.remove('running');
  statusEl.textContent = '🎉 太棒了！休息一下吧~';
  statusEl.style.color = 'var(--pink-deep)';
  updateDisplay(); updateRing();
  ringContainer.classList.add('ring-complete');
  displayWrap.classList.add('timer-pop');
  setTimeout(() => displayWrap.classList.remove('timer-pop'), 500);
  playSound();

  let count = 0;
  const flash = setInterval(() => {
    statusEl.style.color = count % 2 === 0 ? 'var(--pink-deep)' : '#FFB347';
    if (++count >= 8) { clearInterval(flash); statusEl.style.color = 'var(--text-light)'; }
  }, 600);
}

function playSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const melody = [523.25, 659.25, 783.99, 1046.5];
  melody.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.18;
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.start(t); osc.stop(t + 0.5);
  });
  setTimeout(() => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.value = 1046.5;
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.4);
    osc.start(); osc.stop(ctx.currentTime + 1.4);
  }, 750);
}

function updateDisplay() {
  const m = Math.floor(Math.abs(remainingSeconds) / 60);
  const s = Math.abs(remainingSeconds) % 60;
  displayEl.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function updateRing() {
  if (mode === 'countdown') {
    const fraction = totalSeconds > 0 ? (totalSeconds - remainingSeconds) / totalSeconds : 0;
    ring.style.strokeDashoffset = CIRCUMFERENCE * fraction;
  } else {
    const max = 60 * 60;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - Math.min(remainingSeconds / max, 1));
  }
}

updateDisplay(); updateRing();
</script>
</body>
</html>
