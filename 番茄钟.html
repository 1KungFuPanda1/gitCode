<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专注 · 番茄钟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #161613;
  --paper: #F2EDE6;
  --vermillion: #C84B31;
  --gold: #B8975A;
  --stone: #3D3A35;
  --moss: #5B6C5C;
  --charcoal: #262522;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Serif SC', serif;
  background: var(--ink);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  user-select: none; overflow: hidden;
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(200,75,49,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(184,151,90,0.04) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='4' height='4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='%23ffffff' fill-opacity='0.015'/%3E%3C/svg%3E");
}

.app {
  position: relative; padding: 56px 64px 48px;
  max-width: 460px; width: 100%;
}

/* ── 装饰性竖线 ── */
.app::before {
  content: ''; position: absolute; left: 0; top: 40px; bottom: 40px;
  width: 1px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08) 20%, rgba(255,255,255,0.08) 80%, transparent);
}

/* ── 标题 ── */
.title-row {
  display: flex; align-items: baseline; gap: 16px; margin-bottom: 40px; padding-left: 24px;
}
.title-char {
  font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.35);
  letter-spacing: 4px; writing-mode: vertical-rl;
}
.title-divider { width: 24px; height: 1px; background: rgba(255,255,255,0.12); }

/* ── 模式切换 ── */
.mode-switch {
  display: flex; gap: 0; margin-bottom: 48px; padding-left: 24px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.mode-btn {
  padding: 10px 0 14px; border: none; cursor: pointer;
  font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 400;
  background: transparent; color: rgba(255,255,255,0.28);
  transition: all 0.4s; position: relative; margin-right: 36px;
  letter-spacing: 1px;
}
.mode-btn::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: var(--vermillion); transform: scaleX(0); transition: transform 0.4s;
}
.mode-btn.active { color: var(--paper); }
.mode-btn.active::after { transform: scaleX(1); }

/* ── 环形计时器 ── */
.ring-container {
  position: relative; width: 300px; height: 300px; margin: 0 auto 48px;
}
.ring-container svg { width: 100%; height: 100%; }
.ring-bg {
  fill: none; stroke: rgba(255,255,255,0.04); stroke-width: 2;
}
.ring-track {
  fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 1;
}
.ring-progress {
  fill: none; stroke: var(--vermillion); stroke-width: 2;
  stroke-linecap: round; transform: rotate(-90deg); transform-origin: center;
  transition: stroke-dashoffset 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  filter: drop-shadow(0 0 6px rgba(200,75,49,0.5));
}
.ring-progress.countup { stroke: var(--gold); filter: drop-shadow(0 0 6px rgba(184,151,90,0.5)); }

/* 数字刻度点 */
.tick-mark {
  fill: rgba(255,255,255,0.1); r: 1.5;
}

/* 时间显示 */
.timer-display {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center;
}
.timer-minutes {
  font-family: 'DM Mono', monospace; font-size: 72px; font-weight: 400;
  color: var(--paper); letter-spacing: -2px; line-height: 1;
}
.timer-seconds {
  font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 400;
  color: rgba(255,255,255,0.35); margin-top: 2px;
}
.timer-sep { opacity: 0; }

/* ── 预设按钮 ── */
.presets {
  display: flex; gap: 8px; justify-content: center; margin-bottom: 32px; flex-wrap: wrap;
}
.preset-btn {
  padding: 8px 20px; border: 1px solid rgba(255,255,255,0.08); border-radius: 0;
  cursor: pointer; font-family: 'Noto Serif SC', serif; font-size: 13px; font-weight: 400;
  background: transparent; color: rgba(255,255,255,0.4); transition: all 0.3s;
  letter-spacing: 1px;
}
.preset-btn:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
.preset-btn.selected {
  background: rgba(200,75,49,0.15); border-color: var(--vermillion); color: var(--vermillion);
  box-shadow: 0 0 20px rgba(200,75,49,0.1);
}

/* ── 控制按钮 ── */
.controls { display: flex; gap: 16px; justify-content: center; align-items: center; margin-bottom: 28px; }
.ctrl-btn {
  width: 52px; height: 52px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer; font-size: 18px; transition: all 0.35s;
  display: flex; align-items: center; justify-content: center;
  background: transparent; color: rgba(255,255,255,0.4);
}
.ctrl-btn:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.8); }
.btn-main {
  width: 68px; height: 68px; font-size: 24px;
  background: var(--vermillion); color: #fff; border: none;
  box-shadow: 0 6px 30px rgba(200,75,49,0.35), 0 0 0 6px rgba(200,75,49,0.06);
}
.btn-main:hover { transform: scale(1.05); box-shadow: 0 8px 36px rgba(200,75,49,0.5), 0 0 0 10px rgba(200,75,49,0.1); }
.btn-main.running { background: var(--gold); box-shadow: 0 6px 30px rgba(184,151,90,0.4), 0 0 0 6px rgba(184,151,90,0.06); }

/* ── 状态文字 ── */
.status-row {
  text-align: center; margin-bottom: 24px;
}
.status {
  font-family: 'Noto Serif SC', serif; font-size: 13px; color: rgba(255,255,255,0.25);
  letter-spacing: 2px; transition: color 0.5s;
}

/* ── 自定义 ── */
.custom-row {
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.custom-row input {
  width: 48px; padding: 8px 4px; border: none; border-bottom: 1px solid rgba(255,255,255,0.12);
  background: transparent; color: var(--paper); text-align: center;
  font-family: 'DM Mono', monospace; font-size: 16px; outline: none;
  transition: border-color 0.3s;
}
.custom-row input:focus { border-bottom-color: var(--vermillion); }
.custom-row .custom-label {
  font-size: 12px; color: rgba(255,255,255,0.25); letter-spacing: 1px;
}
.custom-row .custom-apply {
  padding: 6px 16px; border: 1px solid rgba(255,255,255,0.08); border-radius: 0;
  cursor: pointer; background: transparent; color: rgba(255,255,255,0.3);
  font-family: 'Noto Serif SC', serif; font-size: 12px; letter-spacing: 1px;
  transition: all 0.3s;
}
.custom-row .custom-apply:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); }

/* ── 完成动画 ── */
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(200,75,49,0.6); }
  50% { box-shadow: 0 0 0 24px rgba(200,75,49,0); }
}
.ring-complete {
  animation: pulse 1.2s ease-in-out 3;
}
@keyframes celebrate {
  0% { transform: translate(-50%, -50%) scale(1); }
  25% { transform: translate(-50%, -50%) scale(1.08); }
  50% { transform: translate(-50%, -50%) scale(0.97); }
  75% { transform: translate(-50%, -50%) scale(1.04); }
  100% { transform: translate(-50%, -50%) scale(1); }
}
.timer-celebrate {
  animation: celebrate 0.6s ease-out;
}
</style>
</head>
<body>

<div class="app">
  <!-- 标题 -->
  <div class="title-row">
    <span class="title-char">专注</span>
    <span class="title-divider"></span>
  </div>

  <!-- 模式切换 -->
  <div class="mode-switch">
    <button class="mode-btn active" data-mode="countdown" onclick="switchMode('countdown')">倒计时</button>
    <button class="mode-btn" data-mode="countup" onclick="switchMode('countup')">正计时</button>
  </div>

  <!-- 环形计时器 -->
  <div class="ring-container" id="ringContainer">
    <svg viewBox="0 0 300 300">
      <!-- 刻度线 -->
      <g id="ticks"></g>
      <!-- 背景轨道 -->
      <circle class="ring-track" cx="150" cy="150" r="125"/>
      <circle class="ring-bg" cx="150" cy="150" r="132"/>
      <!-- 进度弧 -->
      <circle class="ring-progress" id="ring" cx="150" cy="150" r="128.5"
              stroke-dasharray="0" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-display" id="displayWrap">
      <div class="timer-minutes" id="display">25<span class="timer-sep">:</span>00</div>
    </div>
  </div>

  <!-- 预设 -->
  <div class="presets">
    <button class="preset-btn" onclick="setPreset(5)">5 分钟</button>
    <button class="preset-btn selected" onclick="setPreset(25)">25 分钟</button>
    <button class="preset-btn" onclick="setPreset(15)">15 分钟</button>
    <button class="preset-btn" onclick="setPreset(45)">45 分钟</button>
    <button class="preset-btn" onclick="setPreset(60)">60 分钟</button>
  </div>

  <!-- 控制 -->
  <div class="controls">
    <button class="ctrl-btn" onclick="reset()" title="重置">↺</button>
    <button class="ctrl-btn btn-main" id="startBtn" onclick="toggle()">▶</button>
    <button class="ctrl-btn" onclick="skipToEnd()" title="快进">⏭</button>
  </div>

  <div class="status-row">
    <span class="status" id="status">准备专注</span>
  </div>

  <!-- 自定义 -->
  <div class="custom-row">
    <input type="number" id="customMin" min="1" max="120" value="30">
    <span class="custom-label">分钟</span>
    <button class="custom-apply" onclick="setCustom()">自定义</button>
  </div>
</div>

<script>
const RADIUS = 128.5;
const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
const ring = document.getElementById('ring');
const displayEl = document.getElementById('display');
const startBtn = document.getElementById('startBtn');
const statusEl = document.getElementById('status');
const ringContainer = document.getElementById('ringContainer');
const displayWrap = document.getElementById('displayWrap');

ring.style.strokeDasharray = CIRCUMFERENCE;
ring.style.strokeDashoffset = 0;

// 绘制刻度线
const ticksGroup = document.getElementById('ticks');
for (let i = 0; i < 60; i++) {
  const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
  const len = i % 5 === 0 ? 12 : 6;
  const r1 = i % 5 === 0 ? 105 : 110;
  const r2 = r1 + len;
  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx', 150 + Math.cos(angle) * (r1 + len/2));
  circle.setAttribute('cy', 150 + Math.sin(angle) * (r1 + len/2));
  circle.setAttribute('r', i % 5 === 0 ? 2 : 1);
  circle.setAttribute('fill', i % 5 === 0 ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.05)');
  ticksGroup.appendChild(circle);
}

let mode = 'countdown';
let totalSeconds = 25 * 60;
let remainingSeconds = totalSeconds;
let running = false;
let interval = null;

function switchMode(m) {
  if (running) return;
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-mode="${m}"]`).classList.add('active');
  ring.classList.toggle('countup', m === 'countup');
  reset();
}

function setPreset(min) {
  if (running) return;
  totalSeconds = min * 60;
  remainingSeconds = totalSeconds;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');
  updateDisplay();
  updateRing();
  statusEl.textContent = '准备专注';
}

function setCustom() {
  const val = parseInt(document.getElementById('customMin').value);
  if (val < 1 || val > 120) return;
  if (running) return;
  totalSeconds = val * 60;
  remainingSeconds = totalSeconds;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
  updateDisplay();
  updateRing();
  statusEl.textContent = '准备专注';
}

function toggle() { running ? pause() : start(); }

function start() {
  if (running) return;
  if (mode === 'countdown' && remainingSeconds <= 0) {
    remainingSeconds = totalSeconds;
    updateDisplay();
    updateRing();
  }
  running = true;
  startBtn.textContent = '⏸';
  startBtn.classList.add('running');
  statusEl.textContent = mode === 'countdown' ? '专注中' : '计时中';
  ringContainer.classList.remove('ring-complete');

  interval = setInterval(() => {
    if (mode === 'countdown') {
      remainingSeconds--;
      if (remainingSeconds <= 0) { remainingSeconds = 0; complete(); return; }
    } else {
      remainingSeconds++;
    }
    updateDisplay();
    updateRing();
  }, 1000);
}

function pause() {
  running = false;
  clearInterval(interval);
  startBtn.textContent = '▶';
  startBtn.classList.remove('running');
  statusEl.textContent = '已暂停';
}

function reset() {
  running = false;
  clearInterval(interval);
  remainingSeconds = mode === 'countdown' ? totalSeconds : 0;
  startBtn.textContent = '▶';
  startBtn.classList.remove('running');
  updateDisplay();
  updateRing();
  statusEl.textContent = '准备专注';
  ringContainer.classList.remove('ring-complete');
}

function skipToEnd() {
  if (mode !== 'countdown') return;
  if (!running) return;
  remainingSeconds = 0;
  updateDisplay();
  updateRing();
  complete();
}

function complete() {
  running = false;
  clearInterval(interval);
  startBtn.textContent = '▶';
  startBtn.classList.remove('running');
  statusEl.textContent = '完成！';
  statusEl.style.color = 'var(--vermillion)';
  updateDisplay();
  updateRing();
  ringContainer.classList.add('ring-complete');
  displayWrap.classList.add('timer-celebrate');
  setTimeout(() => displayWrap.classList.remove('timer-celebrate'), 600);
  playSound();
  // 闪烁恢复
  let count = 0;
  const flash = setInterval(() => {
    statusEl.style.color = count % 2 === 0 ? 'var(--vermillion)' : 'var(--gold)';
    if (++count >= 8) {
      clearInterval(flash);
      statusEl.style.color = 'rgba(255,255,255,0.25)';
    }
  }, 600);
}

function playSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  // 日本音阶：D4 F4 A4 D5
  const notes = [293.66, 349.23, 440, 587.33];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.22;
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc.start(t); osc.stop(t + 0.6);
  });
  // 结束钟声
  setTimeout(() => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.value = 587.33;
    gain.gain.setValueAtTime(0.22, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
    osc.start(); osc.stop(ctx.currentTime + 1.5);
  }, 900);
}

function updateDisplay() {
  const m = Math.floor(Math.abs(remainingSeconds) / 60);
  const s = Math.abs(remainingSeconds) % 60;
  displayEl.innerHTML = String(m).padStart(2,'0') + '<span class="timer-sep">:</span>' + String(s).padStart(2,'0');
}

function updateRing() {
  if (mode === 'countdown') {
    const fraction = totalSeconds > 0 ? (totalSeconds - remainingSeconds) / totalSeconds : 0;
    ring.style.strokeDashoffset = CIRCUMFERENCE * fraction;
  } else {
    const max = 60 * 60;
    const fraction = Math.min(remainingSeconds / max, 1);
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
  }
}

updateDisplay();
updateRing();
</script>
</body>
</html>
